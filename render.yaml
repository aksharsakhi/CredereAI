services:
  # Backend Java Service
  - type: web
    name: credere-backend
    env: docker
    dockerContext: backend-java
    dockerfilePath: backend-java/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false # User should set this in Render Dashboard
      - key: GROQ_API_KEY
        sync: false # User should set this in Render Dashboard
      - key: JAVA_OPTS
        value: -Xmx512m

  # Frontend React Static Site
  - type: web
    name: credere-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend-react && npm install && npm run build
    staticPublishPath: frontend-react/dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: credere-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  
